<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Lab Imaging{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <a class="brand-mark" href="/">
          <span class="glyph">LI</span>
          Lab Imaging
        </a>
        <nav aria-label="Primary">
          <a href="/" class="{% if request.endpoint == 'status_page' %}is-active{% endif %}">Station status</a>
          <a href="/new" class="{% if request.endpoint == 'new_experiment_page' %}is-active{% endif %}">New experiment</a>
          <a href="/cameras" class="{% if request.endpoint == 'cameras_page' %}is-active{% endif %}">Cameras</a>
          <a href="/verify-cameras" class="{% if request.endpoint == 'verify_cameras_page' %}is-active{% endif %}">Verify cameras</a>
          <a href="/settings" class="{% if request.endpoint == 'settings_page' %}is-active{% endif %}">Settings</a>
        </nav>
        <div class="spacer"></div>
        <span class="live-pill" id="live-pill" hidden>
          <span class="pulse"></span>
          <span>Live · refreshed <span id="last-refresh">now</span></span>
        </span>
      </header>
      <main class="page">
        {% block content %}{% endblock %}
      </main>
    </div>
    {% block scripts %}{% endblock %}
  </body>
</html>
