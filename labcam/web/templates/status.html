{% extends "base.html" %}

{% block title %}Station Status - Lab Imaging{% endblock %}

{% block content %}
  <header class="page-head">
    <div class="titles">
      <div class="eyebrow">Workstation</div>
      <h1>Station status</h1>
      <div class="sub" id="page-sub">Loading stations…</div>
    </div>
    <div class="actions">
      <button class="btn btn-icon" type="button" id="refresh-btn" aria-label="Refresh">
        <svg class="ic ic-16" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7"/><polyline points="21 4 21 9 16 9"/></svg>
      </button>
      <a class="btn is-accent btn-lg" href="/new">
        <svg class="ic ic-16" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New experiment
      </a>
    </div>
  </header>

  <div class="summary" id="summary">
    <div class="cell"><div class="k">Running</div><div class="v"><span class="num">—</span></div></div>
    <div class="cell"><div class="k">Frames captured</div><div class="v"><span class="num">—</span></div></div>
    <div class="cell"><div class="k">Next capture</div><div class="v"><span class="num">—</span></div></div>
    <div class="cell"><div class="k">Health</div><div class="v"><span class="num">—</span></div></div>
  </div>

  <div class="station-grid" id="station-grid">
    <div class="note"><div class="body">Loading stations…</div></div>
  </div>
{% endblock %}

{% block scripts %}
  <script src="{{ url_for('static', filename='status.js') }}"></script>
{% endblock %}
