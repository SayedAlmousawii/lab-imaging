{% extends "base.html" %}

{% block title %}Experiments - Lab Imaging{% endblock %}

{% block content %}
  <header class="page-head">
    <div class="titles">
      <div class="eyebrow">Archive</div>
      <h1>Experiments</h1>
      <div class="sub" id="experiments-sub">Loading experiments...</div>
    </div>
    <div class="actions">
      <button class="btn btn-icon" type="button" id="experiments-refresh" aria-label="Refresh">
        <svg class="ic ic-16" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7"/><polyline points="21 4 21 9 16 9"/></svg>
      </button>
      <a class="btn is-accent btn-lg" href="/new">
        <svg class="ic ic-16" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New experiment
      </a>
    </div>
  </header>

  <div id="experiments-alerts"></div>

  <section class="card browser-filter-card">
    <div class="card-body">
      <div class="browser-filters">
        <div class="field">
          <label class="lbl" for="filter-date">Date</label>
          <select class="select" id="filter-date">
            <option value="">All dates</option>
          </select>
        </div>
        <div class="field">
          <label class="lbl" for="filter-station">Station</label>
          <select class="select" id="filter-station">
            <option value="">All stations</option>
          </select>
        </div>
        <div class="browser-filter-actions">
          <button class="btn" type="button" id="filters-clear">Clear filters</button>
        </div>
      </div>
    </div>
  </section>

  <section class="card experiment-list-card">
    <header class="card-head">
      <h2>Experiment folders</h2>
      <span class="sub" id="experiments-count">-</span>
    </header>
    <div class="experiment-list" id="experiment-list">
      <div class="note"><div class="body">Loading experiments...</div></div>
    </div>
  </section>
{% endblock %}

{% block scripts %}
  <script src="{{ url_for('static', filename='experiments.js') }}"></script>
{% endblock %}
